name: Seed Media

on:
  schedule:
    # Every 30 minutes. GitHub Actions cron is approximate (±minutes under load).
    - cron: '*/30 * * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  seed:
    name: Invoke media-seeder
    runs-on: ubuntu-latest

    steps:
      - name: Call media-seeder Edge Function
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SEEDER_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/media-seeder")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "$body" | jq . || echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "ERROR: seeder returned HTTP $status" && exit 1
          fi
