name: Deploy Migrations to Supabase

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint all SQL migration files with squawk
  # ---------------------------------------------------------------------------
  lint-sql:
    name: Lint SQL Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install npm dependencies (includes squawk-cli)
        run: npm ci

      - name: Lint migrations
        run: npm run lint:sql

  # ---------------------------------------------------------------------------
  # Job 2: Validate that all migrations apply cleanly against a local Supabase
  #         instance running in Docker (no remote project or credentials needed).
  #         ubuntu-latest runners have Docker pre-installed.
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install npm dependencies (includes supabase CLI)
        run: npm ci

      - name: Start Supabase local stack
        run: npx supabase start

      - name: Apply all migrations via db reset
        run: npx supabase db reset --no-seed

      - name: List applied migrations (sanity check, local only)
        run: npx supabase migration list --local

      - name: Stop Supabase local stack
        if: always()
        run: npx supabase stop --no-backup

  # ---------------------------------------------------------------------------
  # Job 3: Deploy migrations to the Supabase project.
  #         Only runs on push to main (not on PRs).
  #
  #         Required repository secrets:
  #           SUPABASE_ACCESS_TOKEN  — personal access token from supabase.com/dashboard/account/tokens
  #           SUPABASE_PROJECT_REF   — the project ref (e.g. abcdefghijklmnop)
  #           SUPABASE_DB_PASSWORD   — the database password
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    needs: [lint-sql, validate-migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install npm dependencies (includes supabase CLI)
        run: npm ci

      - name: Link Supabase project
        run: npx supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to remote database
        run: npx supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function
        run: npx supabase functions deploy api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
