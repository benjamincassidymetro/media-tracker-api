project_id = "media-tracker-api"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = ""

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 1800
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# All functions handle JWT verification themselves (custom auth system).
# Disable automatic JWT verification at the gateway level.
[functions.tokens]
verify_jwt = false

[functions.users]
verify_jwt = false

[functions.media]
verify_jwt = false

[functions.library]
verify_jwt = false

[functions.reviews]
verify_jwt = false

[functions.activity]
verify_jwt = false

[functions.goals]
verify_jwt = false

[functions.quotes]
verify_jwt = false

[functions.priorities]
verify_jwt = false

[functions.docs]
verify_jwt = false

# Scheduled via .github/workflows/seed.yml (GitHub Actions cron) — not via Supabase schedule.
# Requires TMDB_API_KEY, GOOGLE_BOOKS_API_KEY, and SEEDER_SECRET to be set as Supabase secrets.
# Run once after deploying: supabase secrets set TMDB_API_KEY=... GOOGLE_BOOKS_API_KEY=... SEEDER_SECRET=...
[functions.media-seeder]
verify_jwt = false

[analytics]
enabled = false
