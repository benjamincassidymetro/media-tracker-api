[tools]
node = "22"
supabase = "latest"

# ---------------------------------------------------------------------------
# Local development environment variables
# These match the default Supabase CLI local stack — safe to commit.
# For secrets (TMDB_API_KEY, GOOGLE_BOOKS_API_KEY), create mise.local.toml:
#
#   [env]
#   TMDB_API_KEY = "your-key-here"
#   GOOGLE_BOOKS_API_KEY = "your-key-here"
#
# mise.local.toml is gitignored.
# ---------------------------------------------------------------------------

[env]
SUPABASE_URL = "http://127.0.0.1:54321"
# Default local JWT secret used by the Supabase CLI
SUPABASE_JWT_SECRET = "super-secret-jwt-token-with-at-least-32-characters-long"
# supabase functions serve filters SUPABASE_* vars from --env-file, so we use
# EDGE_JWT_SECRET as a passthrough for the same value in local dev.
EDGE_JWT_SECRET = "super-secret-jwt-token-with-at-least-32-characters-long"
# Default local keys (signed with the above secret) — safe to commit, not real secrets
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7W9oNBDAGBwnNAJx8V2YTFF8HH30oO1RJZo"
SUPABASE_SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0"
# Set these in mise.local.toml
TMDB_API_KEY = ""
GOOGLE_BOOKS_API_KEY = ""

[tasks.start]
description = "Start the local Supabase stack (Postgres, Auth, Storage, Edge Runtime, Studio)"
run = "supabase start"

[tasks.stop]
description = "Stop the local Supabase stack"
run = "supabase stop"

[tasks.status]
description = "Show status of local Supabase services"
run = "supabase status"

[tasks."db:reset"]
description = "Wipe the local database and re-run all migrations from scratch"
run = "supabase db reset"

[tasks."db:migrate"]
description = "Apply pending migrations to the local database"
run = "supabase migration up --local"

[tasks."functions:serve"]
description = "Serve all edge functions locally with hot reload"
run = """
printf "EDGE_JWT_SECRET=%s\n" "$EDGE_JWT_SECRET" > supabase/.env.local
supabase functions serve --env-file supabase/.env.local
"""

[tasks.seed]
description = "Run the media seed script (set TMDB_API_KEY and GOOGLE_BOOKS_API_KEY in mise.local.toml)"
run = "npx tsx backend/scripts/seed.ts"

[tasks."provision-clients"]
description = "Provision per-student OAuth clients (--students file.txt | --count N)"
run = "npx tsx backend/scripts/provision-clients.ts"

[tasks.test]
description = "Run E2E tests against the local Supabase stack (requires: mise run start && mise run db:reset)"
run = "npm test"

[tasks."test:watch"]
description = "Run E2E tests in watch mode"
run = "npm run test:watch"

[tasks.lint]
description = "Lint backend scripts with ESLint"
run = "eslint backend/"

[tasks.format]
description = "Format all files with Prettier"
run = "prettier --write ."

[tasks."format:check"]
description = "Check formatting without writing"
run = "prettier --check ."

[tasks.typecheck]
description = "Type-check backend scripts (Deno functions use deno check)"
run = "tsc --project backend/tsconfig.json --noEmit"

[tasks."deno:check"]
description = "Type-check all Supabase edge functions"
run = "deno check supabase/functions/**/*.ts"

[tasks."deno:lint"]
description = "Lint all Supabase edge functions"
run = "deno lint supabase/functions/"

[tasks."deno:format"]
description = "Format all Supabase edge functions with deno fmt"
run = "deno fmt supabase/functions/"
